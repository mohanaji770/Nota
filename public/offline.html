<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#257244" />
    <title>ملاحظات - بدون اتصال</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f5;
        color: #171613;
        font-family: Roboto, "Noto Sans Arabic", Tahoma, Arial, sans-serif;
      }
      main {
        width: min(88vw, 390px);
        text-align: center;
        line-height: 1.8;
      }
      .mark {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        margin: 0 auto 18px;
        background: #257244;
        display: grid;
        place-items: center;
        color: white;
        font-size: 34px;
      }
      p {
        color: #76736b;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ن</div>
      <h1>أنت الآن بدون اتصال</h1>
      <p>الملاحظات المحفوظة محليًا ستبقى متاحة. افتح التطبيق مرة أخرى عند عودة الاتصال.</p>
    </main>
  </body>
</html>
